name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  compile-sensevoice:
    name: Compile ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: darwin-arm64
          - os: macos-13
            arch: darwin-x64
          - os: ubuntu-latest
            arch: linux-x64
          - os: windows-latest
            arch: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Clone SenseVoice.cpp
        run: |
          git clone --depth 1 https://github.com/lovemefan/SenseVoice.cpp
          cd SenseVoice.cpp
          git submodule update --init --recursive

      - name: Build sense-voice
        run: |
          cd SenseVoice.cpp
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --target sense-voice-main -j 4 --config Release

      - name: Collect binary
        shell: bash
        run: |
          BINARY=$(find SenseVoice.cpp/build -name 'sense-voice-main*' -type f | head -1)
          if [[ "${{ matrix.arch }}" == "win-x64" ]]; then
            cp "$BINARY" sense-voice.exe
          else
            cp "$BINARY" sense-voice
            chmod +x sense-voice
          fi
          ls -lh sense-voice* || ls -lh

      - uses: actions/upload-artifact@v4
        with:
          name: sense-voice-${{ matrix.arch }}
          path: sense-voice*

  package-skill:
    name: Package .skill
    needs: compile-sensevoice
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download compiled binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize binaries
        run: |
          mkdir -p bin/darwin-arm64 bin/darwin-x64 bin/linux-x64 bin/win-x64
          cp artifacts/sense-voice-darwin-arm64/sense-voice      bin/darwin-arm64/sense-voice
          cp artifacts/sense-voice-darwin-x64/sense-voice        bin/darwin-x64/sense-voice
          cp artifacts/sense-voice-linux-x64/sense-voice         bin/linux-x64/sense-voice
          cp artifacts/sense-voice-win-x64/sense-voice.exe       bin/win-x64/sense-voice.exe
          chmod +x bin/*/sense-voice
          ls -lhR bin/

      - name: Build .skill artifact
        run: python3 scripts/build_skill.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
          generate_release_notes: true
